<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Панель администратора</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
        }
        .bubble:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 15%; }
        .bubble:nth-child(2) { width: 300px; height: 300px; bottom: 15%; right: 10%; animation-duration: 10s; }
        .bubble:nth-child(3) { width: 150px; height: 150px; top: 40%; right: 25%; animation-duration: 6s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        h1 {
            color: white;
            margin-bottom: 2rem;
            font-weight: 600;
        }
        .action-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 0 1rem;
            text-decoration: none;
            min-width: 200px;
        }
        .action-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            color: white;
        }
        .action-card .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        a {
            color: #9bb7d4;
        }
    </style>
</head>
<body>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="content">
    <h1>🛠 Панель администратора</h1>
    <div>
        <a th:href="@{${addFlightUrl}}" class="action-card">
            <span class="icon">✈️</span>
            Добавить рейс
        </a>
        <a th:href="@{/flights/page(admin=true)}" class="action-card">
            <span class="icon">📋</span>
            Управление рейсами
        </a>
        <a th:href="@{/admin/tickets}" class="action-card">
            <span class="icon">🎫</span>
            Все билеты
        </a>
        <a th:href="@{/admin/passengers}" class="action-card">
            <span class="icon">👥</span>
            Пассажиры
        </a>
    </div>
    <p class="mt-4">
        <a href="/flights/page">← Вернуться на главную</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
