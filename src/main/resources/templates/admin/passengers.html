<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Пассажиры</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
        }
        .bubble:nth-child(1) { width: 200px; height: 200px; top: 5%; left: 10%; }
        .bubble:nth-child(2) { width: 300px; height: 300px; bottom: 10%; right: 10%; animation-duration: 10s; }
        .bubble:nth-child(3) { width: 150px; height: 150px; top: 30%; right: 30%; animation-duration: 6s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 2rem 0;
        }
        .navbar-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: inline-block;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .passenger-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .passenger-card:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }
        .passenger-card h4 {
            color: white;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }
        .passenger-card p {
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 0.4rem;
        }
        h1 {
            color: white;
            margin-bottom: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container content">
    <div class="navbar-glass">
        <a href="/flights/page" class="btn-glass">✈️ Все рейсы</a>
        <div>
            <a href="/admin/panel" class="btn-glass me-2">🛠 Панель управления</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn-glass">🚪 Выйти</button>
            </form>
        </div>
    </div>

    <h1>👥 Все пассажиры</h1>

    <div th:if="${#lists.isEmpty(passengers)}" style="color: rgba(255,255,255,0.7); text-align: center;">
        <p>В системе пока нет пассажиров.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="passenger : ${passengers}">
            <div class="passenger-card">
                <div>
                    <h4 th:text="${passenger.firstName} + ' ' + ${passenger.lastName}"></h4>
                    <p>🆔 Паспорт: <span th:text="${passenger.passportNumber}"></span></p>
                    <p>🎂 Возраст: <span th:text="${passenger.age}"></span></p>
                    <p>⚧ Пол: <span th:text="${passenger.gender} == 'M' ? 'Мужской' : 'Женский'"></span></p>
                    <form th:action="@{/admin/passengers/delete-passenger}" method="post" class="mt-2">
                        <input type="hidden" name="passengerId" th:value="${passenger.id}" />
                        <button type="submit" class="btn-glass" style="background: rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.3); width: 100%;"
                                onclick="return confirm('Удалить пассажира? Место вернётся рейсу.')">
                            🗑️ Удалить пассажира
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
