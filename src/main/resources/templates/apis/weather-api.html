<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Погода</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 100%;
            max-width: 500px;
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            width: 100%;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #778da9;
            box-shadow: 0 0 15px rgba(119, 141, 169, 0.5);
            color: white;
        }
        .result-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            text-align: center;
        }
        .temperature {
            font-size: 3rem;
            font-weight: bold;
        }
        a {
            color: #9bb7d4;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h2 class="text-center mb-4">🌡️ Погода сейчас</h2>
    <form th:action="@{/weather-api}" method="post">
        <div class="mb-3">
            <label for="lat" class="form-label">Широта (lat)</label>
            <input type="number" step="any" name="lat" id="lat" class="form-control" placeholder="57.7677" required>
        </div>
        <div class="mb-3">
            <label for="lon" class="form-label">Долгота (lon)</label>
            <input type="number" step="any" name="lon" id="lon" class="form-control" placeholder="40.9261" required>
        </div>
        <button type="submit" class="btn-glass">Узнать погоду</button>
    </form>
    <div th:if="${temperature}" class="result-box">
        <p class="mb-0">Температура воздуха</p>
        <p class="temperature" th:text="${temperature} + '°C'"></p>
    </div>
    <p class="text-center mt-3 mb-0">
        <a href="/flights/page">← Вернуться к рейсам</a>
    </p>
</div>
</body>
</html>
