<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Рейсы</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s infinite ease-in-out;
        }
        .bubble:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 20%; }
        .bubble:nth-child(2) { width: 300px; height: 300px; top: 60%; left: 70%; animation-duration: 10s; }
        .bubble:nth-child(3) { width: 150px; height: 150px; top: 30%; left: 50%; animation-duration: 6s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 100%;
            max-width: 1100px;
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: inline-block;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .table {
            color: white;
            border-radius: 15px;
            overflow: hidden;
        }
        .table thead {
            background: rgba(255, 255, 255, 0.2);
        }
        .table tbody tr {
            transition: all 0.3s ease;
        }
        .table tbody tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
<!-- Пузыри на фоне -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="glass-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">✈️ Доступные рейсы</h1>
        <div>
            <a href="/profile" class="btn-glass">👤 Профиль</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn-glass">🚪 Выйти</button>
            </form>
        </div>
    </div>

    <table class="table table-borderless">
        <thead>
        <tr>
            <th>Номер рейса</th>
            <th>Компания</th>
            <th>Откуда</th>
            <th>Куда</th>
            <th>Дата вылета</th>
            <th>Цена</th>
            <th>Мест</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="flight : ${flights}">
            <td th:text="${flight.flightNumber}"></td>
            <td th:text="${flight.companyName}"></td>
            <td th:text="${flight.departureCity}"></td>
            <td th:text="${flight.arrivalCity}"></td>
            <td th:text="${flight.departureTime}"></td>
            <td th:text="${flight.price + ' ₽'}"></td>
            <td th:text="${flight.availableSeats}"></td>
            <td>
                <a th:href="@{/tickets/purchase/{flightId}(flightId=${flight.id})}" class="btn-glass btn-sm">Купить билет</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
