<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавить рейс</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
        }
        .bubble:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 15%; }
        .bubble:nth-child(2) { width: 300px; height: 300px; bottom: 15%; right: 10%; animation-duration: 10s; }
        .bubble:nth-child(3) { width: 150px; height: 150px; top: 40%; right: 25%; animation-duration: 6s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 100%;
            max-width: 600px;
            z-index: 1;
            position: relative;
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #778da9;
            box-shadow: 0 0 15px rgba(119, 141, 169, 0.5);
            color: white;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        a {
            color: #9bb7d4;
        }
    </style>
</head>
<body>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="glass-card">
    <h2 class="text-center mb-4">✈️ Добавить новый рейс</h2>

    <form th:action="@{/admin/flights/add}" method="post">
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="flightNumber" class="form-label">Номер рейса</label>
                <input type="text" name="flightNumber" id="flightNumber" class="form-control" placeholder="SU-123" required>
            </div>
            <div class="col-md-6">
                <label for="companyName" class="form-label">Компания</label>
                <input type="text" name="companyName" id="companyName" class="form-control" placeholder="Aeroflot" required>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="departureCity" class="form-label">Город отправления</label>
                <input type="text" name="departureCity" id="departureCity" class="form-control" placeholder="Москва" required>
            </div>
            <div class="col-md-6">
                <label for="arrivalCity" class="form-label">Город прибытия</label>
                <input type="text" name="arrivalCity" id="arrivalCity" class="form-control" placeholder="Санкт-Петербург" required>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="departureTime" class="form-label">Дата вылета</label>
                <input type="date" name="departureTime" id="departureTime" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label for="arrivalTime" class="form-label">Дата прилёта</label>
                <input type="date" name="arrivalTime" id="arrivalTime" class="form-control" required>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-md-6">
                <label for="price" class="form-label">Цена (₽)</label>
                <input type="number" step="0.01" name="price" id="price" class="form-control" placeholder="5000" required>
            </div>
            <div class="col-md-6">
                <label for="availableSeats" class="form-label">Количество мест</label>
                <input type="number" name="availableSeats" id="availableSeats" class="form-control" placeholder="100" required>
            </div>
        </div>
        <button type="submit" class="btn-glass w-100">Добавить рейс</button>
    </form>

    <p class="text-center mt-3 mb-0">
        <a href="/flights/page">← Вернуться к рейсам</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
