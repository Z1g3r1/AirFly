<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вход в систему</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        /* Анимированные пузыри на фоне */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s infinite ease-in-out;
        }
        .bubble:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 20%; }
        .bubble:nth-child(2) { width: 300px; height: 300px; top: 60%; left: 70%; animation-duration: 10s; }
        .bubble:nth-child(3) { width: 150px; height: 150px; top: 30%; left: 50%; animation-duration: 6s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 100%;
            max-width: 420px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #778da9;
            box-shadow: 0 0 15px rgba(119, 141, 169, 0.5);
            color: white;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        a {
            color: #9bb7d4;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #c1d3e0;
        }
        .alert {
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
<!-- Пузыри на фоне -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="glass-card">
    <h2 class="text-center mb-4">✈️ Вход в систему</h2>

    <div th:if="${param.error}" class="alert alert-danger bg-danger bg-opacity-50 text-white border-0">
        ❌ Неверный логин или пароль
    </div>
    <div th:if="${param.registered}" class="alert alert-success bg-success bg-opacity-50 text-white border-0">
        ✅ Регистрация успешна! Войдите.
    </div>
    <div th:if="${param.logout}" class="alert alert-info bg-info bg-opacity-50 text-white border-0">
        👋 Вы вышли из системы
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Имя пользователя</label>
            <input type="text" name="username" id="username" class="form-control" placeholder="Введите логин" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="btn btn-glass w-100">Войти</button>
    </form>

    <p class="text-center mt-4 mb-0">
        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
