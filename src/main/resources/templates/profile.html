<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Личный кабинет</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
        }
        .bubble:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 15%; }
        .bubble:nth-child(2) { width: 300px; height: 300px; bottom: 15%; right: 10%; animation-duration: 10s; }
        .bubble:nth-child(3) { width: 150px; height: 150px; top: 40%; right: 25%; animation-duration: 6s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 100%;
            max-width: 480px;
            z-index: 1;
            position: relative;
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #778da9;
            box-shadow: 0 0 15px rgba(119, 141, 169, 0.5);
            color: white;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .profile-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        a {
            color: #9bb7d4;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #c1d3e0;
        }
        .alert {
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .btn-logout {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="glass-card">
    <h2 class="text-center mb-4">👤 Личный кабинет</h2>

    <div th:if="${param.passwordChanged}" class="alert alert-success bg-success bg-opacity-50 text-white border-0">
        ✅ Пароль успешно изменён!
    </div>
    <div th:if="${param.error}" class="alert alert-danger bg-danger bg-opacity-50 text-white border-0">
        ❌ Неверный старый пароль
    </div>

    <div class="profile-info">
        <p><strong>Имя пользователя:</strong> <span th:text="${username}"></span></p>
        <p><strong>Роль:</strong> <span th:text="${role}"></span></p>
    </div>

    <h5 class="mb-3">Сменить пароль</h5>
    <form th:action="@{/profile/change-password}" method="post">
        <div class="mb-3">
            <label for="oldPassword" class="form-label">Старый пароль</label>
            <input type="password" name="oldPassword" id="oldPassword" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="mb-4">
            <label for="newPassword" class="form-label">Новый пароль</label>
            <input type="password" name="newPassword" id="newPassword" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-glass w-100 mb-3">Сменить пароль</button>
    </form>

    <div class="d-flex justify-content-between align-items-center">
        <a href="/flights/page">← К рейсам</a>
        <a href="/tickets/my">Мои билеты</a>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn-logout">🚪 Выйти</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
